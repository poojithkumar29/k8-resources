apiVersion: v1
kind: pord 
metadata:
  name: emptyDir-demo
  namespace: default
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - mounthPath: /var/log/nginx
      name: nginx-logs
  - name: almalinux
    image: almalinux:9
    command: ["sleep", "1000"]
    volumeMounts:
    - mounthPath: /mnt/nginx-log
      name: nginx-logs
      readOnly: true
  volumes:
  - name: nginx-logs
    emptyDir:
      sizeLimit: 100Mi